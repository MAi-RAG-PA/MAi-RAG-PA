name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --max-warnings=0

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=app.security.auth \
            --cov=app.websocket_manager \
            --cov=app.rag.context_manager \
            --cov=app.utils.structured_logging \
            --cov=app.memory.sqlite_memory \
            --cov=app.security.input_validation \
            --cov=app.rag.model_manager \
            --cov-report=term-missing \
            --cov-fail-under=70

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify dist output exists
        run: |
          test -f frontend/dist/index.html || (echo "ERROR: index.html not found in dist/" && exit 1)
          echo "Frontend build verified"
